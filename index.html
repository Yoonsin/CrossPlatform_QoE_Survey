<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QoE 설문조사</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      max-width: 680px;
      width: 100%;
      padding: 40px 48px;
    }

    .card-header {
      text-align: center;
      margin-bottom: 36px;
    }

    .card-header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #1a202c;
      margin-bottom: 8px;
    }

    .card-header p {
      font-size: 0.95rem;
      color: #718096;
    }

    /* ID 입력 */
    .id-section {
      margin-bottom: 32px;
    }

    .id-section label {
      display: block;
      font-size: 0.9rem;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: 8px;
    }

    .id-section input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      color: #2d3748;
      transition: border-color 0.2s;
      outline: none;
    }

    .id-section input:focus {
      border-color: #667eea;
    }

    /* 시나리오 / 단계 선택 */
    .stage-section {
      margin-bottom: 32px;
    }

    .stage-section .stage-row {
      display: flex;
      gap: 24px;
      align-items: flex-start;
    }

    .stage-group {
      flex: 1;
    }

    .stage-group .stage-label {
      display: block;
      font-size: 0.9rem;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: 10px;
    }

    .seg-control {
      display: flex;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      overflow: hidden;
    }

    .seg-control input[type="radio"] {
      display: none;
    }

    .seg-control label {
      flex: 1;
      text-align: center;
      padding: 10px 6px;
      font-size: 0.9rem;
      font-weight: 500;
      color: #718096;
      cursor: pointer;
      border-right: 1px solid #e2e8f0;
      transition: background 0.15s, color 0.15s;
      user-select: none;
    }

    .seg-control label:last-of-type {
      border-right: none;
    }

    .seg-control input[type="radio"]:checked + label {
      background: #667eea;
      color: #fff;
      font-weight: 700;
    }

    .stage-badge {
      display: inline-block;
      margin-top: 10px;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.82rem;
      font-weight: 600;
      background: #ebf4ff;
      color: #4c6ef5;
      display: none;
    }

    /* 구분선 */
    .divider {
      border: none;
      border-top: 1px solid #e2e8f0;
      margin: 32px 0;
    }

    /* 섹션 헤더 */
    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }

    .section-badge {
      display: inline-block;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 0.82rem;
      font-weight: 700;
      background: #667eea;
      color: #fff;
    }

    .section-title {
      font-size: 1rem;
      font-weight: 600;
      color: #4a5568;
    }

    /* 질문 카드 */
    .question-block {
      margin-bottom: 32px;
    }

    .question-block:last-of-type {
      margin-bottom: 0;
    }

    .question-label {
      font-size: 1rem;
      font-weight: 600;
      color: #2d3748;
      margin-bottom: 4px;
      line-height: 1.5;
    }

    .question-num {
      display: inline-block;
      background: #667eea;
      color: #fff;
      font-size: 0.75rem;
      font-weight: 700;
      border-radius: 6px;
      padding: 2px 8px;
      margin-right: 8px;
      vertical-align: middle;
    }

    /* 리커트 스케일 */
    .likert {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }

    .likert-option {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .likert-option input[type="radio"] {
      display: none;
    }

    .likert-option label {
      cursor: pointer;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 12px 4px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      transition: all 0.15s ease;
      user-select: none;
    }

    .likert-option label:hover {
      border-color: #a3bffa;
      background: #ebf4ff;
    }

    .likert-option input[type="radio"]:checked + label {
      border-color: #667eea;
      background: #667eea;
      color: #fff;
    }

    .likert-option input[type="radio"]:checked + label .score-num {
      color: #fff;
    }

    .likert-option input[type="radio"]:checked + label .score-text {
      color: rgba(255,255,255,0.9);
    }

    .score-num {
      font-size: 1.2rem;
      font-weight: 700;
      color: #4a5568;
    }

    .score-text {
      font-size: 0.65rem;
      font-weight: 500;
      color: #718096;
      text-align: center;
      line-height: 1.3;
    }

    /* 경고 배너 */
    .warn-banner {
      display: none;
      background: #fffbeb;
      border: 1px solid #f6e05e;
      border-radius: 10px;
      padding: 12px 16px;
      margin-top: 20px;
      font-size: 0.88rem;
      color: #744210;
    }

    .warn-banner .warn-actions {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .warn-actions button {
      padding: 6px 16px;
      border-radius: 8px;
      border: none;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
    }

    .warn-confirm-btn {
      background: #667eea;
      color: #fff;
    }

    .warn-cancel-btn {
      background: #e2e8f0;
      color: #4a5568;
    }

    /* 제출 버튼 */
    .submit-btn {
      display: block;
      width: 100%;
      padding: 14px;
      margin-top: 36px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    .submit-btn:hover {
      opacity: 0.92;
    }

    .submit-btn:active {
      transform: scale(0.99);
    }

    .submit-btn:disabled {
      background: #a0aec0;
      cursor: not-allowed;
    }

    /* 완료 메시지 */
    .success-msg {
      display: none;
      text-align: center;
      padding: 24px 0 8px;
    }

    .success-msg .icon {
      font-size: 3rem;
      margin-bottom: 12px;
    }

    .success-msg h2 {
      font-size: 1.3rem;
      color: #2d3748;
      margin-bottom: 8px;
    }

    .success-msg p {
      color: #718096;
      font-size: 0.95rem;
    }

    .error-msg {
      display: none;
      text-align: center;
      color: #e53e3e;
      font-size: 0.9rem;
      margin-top: 12px;
    }

    @media (max-width: 520px) {
      .card {
        padding: 28px 20px;
      }

      .likert {
        gap: 4px;
      }

      .score-text {
        font-size: 0.58rem;
      }

      .stage-section .stage-row {
        flex-direction: column;
        gap: 16px;
      }
    }
  </style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <h1>QoE 설문조사</h1>
    <p>각 항목에 대해 본인의 생각과 가장 가까운 점수를 선택해 주세요.</p>
  </div>

  <form id="surveyForm">
    <!-- 참가자 ID -->
    <div class="id-section">
      <label for="userId">참가자 ID</label>
      <input type="text" id="userId" placeholder="예: P001" autocomplete="off" />
    </div>

    <!-- 시나리오 / 단계 선택 -->
    <div class="stage-section">
      <div class="stage-row">
        <!-- 시나리오 선택 -->
        <div class="stage-group">
          <span class="stage-label">시나리오</span>
          <div class="seg-control">
            <input type="radio" name="scenario" id="sc1" value="1" />
            <label for="sc1">1</label>
            <input type="radio" name="scenario" id="sc2" value="2" />
            <label for="sc2">2</label>
            <input type="radio" name="scenario" id="sc3" value="3" />
            <label for="sc3">3</label>
          </div>
        </div>
        <!-- 단계 선택 -->
        <div class="stage-group">
          <span class="stage-label">단계</span>
          <div class="seg-control">
            <input type="radio" name="stage" id="st-before" value="적용 전" />
            <label for="st-before">적용 전</label>
            <input type="radio" name="stage" id="st-after" value="적용 후" />
            <label for="st-after">적용 후</label>
          </div>
        </div>
      </div>
    </div>

    <hr class="divider" />

    <!-- 섹션 헤더 -->
    <div class="section-header">
      <span class="section-badge" id="currentStageLabel">설문 문항</span>
      <span class="section-title">아래 문항에 응답해 주세요</span>
    </div>

    <!-- Q1 -->
    <div class="question-block">
      <div class="question-label">
        <span class="question-num">Q1</span>
        게임이 느리거나 부자연스럽게 느껴졌다
      </div>
      <div class="likert" id="q1">
        <div class="likert-option">
          <input type="radio" name="q1" id="q1-1" value="1" />
          <label for="q1-1">
            <span class="score-num">1</span>
            <span class="score-text">전혀<br>그렇지 않다</span>
          </label>
        </div>
        <div class="likert-option">
          <input type="radio" name="q1" id="q1-2" value="2" />
          <label for="q1-2">
            <span class="score-num">2</span>
            <span class="score-text">그렇지<br>않다</span>
          </label>
        </div>
        <div class="likert-option">
          <input type="radio" name="q1" id="q1-3" value="3" />
          <label for="q1-3">
            <span class="score-num">3</span>
            <span class="score-text">보통<br>이다</span>
          </label>
        </div>
        <div class="likert-option">
          <input type="radio" name="q1" id="q1-4" value="4" />
          <label for="q1-4">
            <span class="score-num">4</span>
            <span class="score-text">그렇다</span>
          </label>
        </div>
        <div class="likert-option">
          <input type="radio" name="q1" id="q1-5" value="5" />
          <label for="q1-5">
            <span class="score-num">5</span>
            <span class="score-text">매우<br>그렇다</span>
          </label>
        </div>
      </div>
    </div>

    <!-- Q2 -->
    <div class="question-block">
      <div class="question-label">
        <span class="question-num">Q2</span>
        상대가 나보다 유리한 환경이라고 느꼈다
      </div>
      <div class="likert" id="q2">
        <div class="likert-option">
          <input type="radio" name="q2" id="q2-1" value="1" />
          <label for="q2-1">
            <span class="score-num">1</span>
            <span class="score-text">전혀<br>그렇지 않다</span>
          </label>
        </div>
        <div class="likert-option">
          <input type="radio" name="q2" id="q2-2" value="2" />
          <label for="q2-2">
            <span class="score-num">2</span>
            <span class="score-text">그렇지<br>않다</span>
          </label>
        </div>
        <div class="likert-option">
          <input type="radio" name="q2" id="q2-3" value="3" />
          <label for="q2-3">
            <span class="score-num">3</span>
            <span class="score-text">보통<br>이다</span>
          </label>
        </div>
        <div class="likert-option">
          <input type="radio" name="q2" id="q2-4" value="4" />
          <label for="q2-4">
            <span class="score-num">4</span>
            <span class="score-text">그렇다</span>
          </label>
        </div>
        <div class="likert-option">
          <input type="radio" name="q2" id="q2-5" value="5" />
          <label for="q2-5">
            <span class="score-num">5</span>
            <span class="score-text">매우<br>그렇다</span>
          </label>
        </div>
      </div>
    </div>

    <!-- Q3 -->
    <div class="question-block">
      <div class="question-label">
        <span class="question-num">Q3</span>
        결과가 내 실력에 비해 잘 안 나온 것 같다고 느꼈다
      </div>
      <div class="likert" id="q3">
        <div class="likert-option">
          <input type="radio" name="q3" id="q3-1" value="1" />
          <label for="q3-1">
            <span class="score-num">1</span>
            <span class="score-text">전혀<br>그렇지 않다</span>
          </label>
        </div>
        <div class="likert-option">
          <input type="radio" name="q3" id="q3-2" value="2" />
          <label for="q3-2">
            <span class="score-num">2</span>
            <span class="score-text">그렇지<br>않다</span>
          </label>
        </div>
        <div class="likert-option">
          <input type="radio" name="q3" id="q3-3" value="3" />
          <label for="q3-3">
            <span class="score-num">3</span>
            <span class="score-text">보통<br>이다</span>
          </label>
        </div>
        <div class="likert-option">
          <input type="radio" name="q3" id="q3-4" value="4" />
          <label for="q3-4">
            <span class="score-num">4</span>
            <span class="score-text">그렇다</span>
          </label>
        </div>
        <div class="likert-option">
          <input type="radio" name="q3" id="q3-5" value="5" />
          <label for="q3-5">
            <span class="score-num">5</span>
            <span class="score-text">매우<br>그렇다</span>
          </label>
        </div>
      </div>
    </div>

    <!-- Q4 -->
    <div class="question-block">
      <div class="question-label">
        <span class="question-num">Q4</span>
        목표 달성에 본인이 충분히 기여했다고 느꼈다
      </div>
      <div class="likert" id="q4">
        <div class="likert-option">
          <input type="radio" name="q4" id="q4-1" value="1" />
          <label for="q4-1">
            <span class="score-num">1</span>
            <span class="score-text">전혀<br>그렇지 않다</span>
          </label>
        </div>
        <div class="likert-option">
          <input type="radio" name="q4" id="q4-2" value="2" />
          <label for="q4-2">
            <span class="score-num">2</span>
            <span class="score-text">그렇지<br>않다</span>
          </label>
        </div>
        <div class="likert-option">
          <input type="radio" name="q4" id="q4-3" value="3" />
          <label for="q4-3">
            <span class="score-num">3</span>
            <span class="score-text">보통<br>이다</span>
          </label>
        </div>
        <div class="likert-option">
          <input type="radio" name="q4" id="q4-4" value="4" />
          <label for="q4-4">
            <span class="score-num">4</span>
            <span class="score-text">그렇다</span>
          </label>
        </div>
        <div class="likert-option">
          <input type="radio" name="q4" id="q4-5" value="5" />
          <label for="q4-5">
            <span class="score-num">5</span>
            <span class="score-text">매우<br>그렇다</span>
          </label>
        </div>
      </div>
    </div>

    <!-- 미응답 경고 배너 -->
    <div class="warn-banner" id="warnBanner">
      ⚠️ 일부 문항에 응답하지 않았습니다. 그래도 제출하시겠습니까?
      <div class="warn-actions">
        <button type="button" class="warn-confirm-btn" id="warnConfirm">그래도 제출</button>
        <button type="button" class="warn-cancel-btn" id="warnCancel">돌아가기</button>
      </div>
    </div>

    <button type="submit" class="submit-btn" id="submitBtn">제출하기</button>
    <div class="error-msg" id="errorMsg"></div>
  </form>

  <!-- 완료 메시지 -->
  <div class="success-msg" id="successMsg">
    <div class="icon">✅</div>
    <h2>설문이 완료되었습니다!</h2>
    <p>참여해 주셔서 감사합니다.</p>
  </div>
</div>

<script>
  // ============================================================
  // Google Apps Script 웹앱 URL을 아래에 붙여넣으세요
  // (README.md 의 설정 가이드 참고)
  // ============================================================
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzEwDISQ4w97tkyCDF3WDwt75wu8T-UfvJ1LX8N-Y2ulBwjL2-EtKk3owKKMRcTy_lwSQ/exec";

  const form = document.getElementById("surveyForm");
  const submitBtn = document.getElementById("submitBtn");
  const successMsg = document.getElementById("successMsg");
  const errorMsg = document.getElementById("errorMsg");
  const warnBanner = document.getElementById("warnBanner");
  const warnConfirm = document.getElementById("warnConfirm");
  const warnCancel = document.getElementById("warnCancel");
  const currentStageLabel = document.getElementById("currentStageLabel");

  // 시나리오/단계 선택 시 섹션 헤더 업데이트
  document.querySelectorAll('input[name="scenario"], input[name="stage"]').forEach(radio => {
    radio.addEventListener("change", updateStageLabel);
  });

  function updateStageLabel() {
    const scenario = form.scenario.value;
    const stage = form.stage.value;
    if (scenario && stage) {
      currentStageLabel.textContent = `시나리오 ${scenario} · ${stage}`;
    } else if (scenario) {
      currentStageLabel.textContent = `시나리오 ${scenario}`;
    } else if (stage) {
      currentStageLabel.textContent = stage;
    } else {
      currentStageLabel.textContent = "설문 문항";
    }
  }

  // 미응답 경고 확인 시 강제 제출
  warnConfirm.addEventListener("click", function () {
    warnBanner.style.display = "none";
    doSubmit(true);
  });

  warnCancel.addEventListener("click", function () {
    warnBanner.style.display = "none";
  });

  form.addEventListener("submit", async function (e) {
    e.preventDefault();
    warnBanner.style.display = "none";

    const userId = document.getElementById("userId").value.trim();
    if (!userId) {
      showError("참가자 ID를 입력해 주세요.");
      return;
    }

    const scenario = form.scenario.value;
    if (!scenario) {
      showError("시나리오를 선택해 주세요.");
      return;
    }

    const stage = form.stage.value;
    if (!stage) {
      showError("단계(적용 전/후)를 선택해 주세요.");
      return;
    }

    hideError();

    // Q1~Q4 미응답 항목 확인
    const answered = ["q1","q2","q3","q4"].filter(q => form[q].value);
    if (answered.length < 4) {
      warnBanner.style.display = "block";
      return;
    }

    doSubmit(false);
  });

  async function doSubmit(allowPartial) {
    const userId = document.getElementById("userId").value.trim();
    const scenario = form.scenario.value;
    const stage = form.stage.value;

    const q1 = form.q1.value ? parseInt(form.q1.value) : null;
    const q2 = form.q2.value ? parseInt(form.q2.value) : null;
    const q3 = form.q3.value ? parseInt(form.q3.value) : null;
    const q4 = form.q4.value ? parseInt(form.q4.value) : null;

    submitBtn.disabled = true;
    submitBtn.textContent = "제출 중...";

    const payload = {
      userId,
      scenario: parseInt(scenario),
      stage,
      q1,
      q2,
      q3,
      q4,
      timestamp: new Date().toISOString(),
    };

    if (APPS_SCRIPT_URL === "YOUR_APPS_SCRIPT_URL_HERE") {
      saveLocally(payload);
      showSuccess();
      return;
    }

    try {
      await fetch(APPS_SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      saveLocally(payload);
      showSuccess();
    } catch (err) {
      submitBtn.disabled = false;
      submitBtn.textContent = "제출하기";
      showError("제출 중 오류가 발생했습니다. 다시 시도해 주세요.");
    }
  }

  function saveLocally(data) {
    const key = "qoe_responses";
    const existing = JSON.parse(localStorage.getItem(key) || "[]");
    existing.push(data);
    localStorage.setItem(key, JSON.stringify(existing));
  }

  function showSuccess() {
    form.style.display = "none";
    successMsg.style.display = "block";
  }

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.style.display = "block";
  }

  function hideError() {
    errorMsg.style.display = "none";
  }
</script>
</body>
</html>
