<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QoE 설문조사</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 32px 24px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      max-width: 720px;
      width: 100%;
      padding: 40px 48px;
    }

    .card-header {
      text-align: center;
      margin-bottom: 36px;
    }

    .card-header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #1a202c;
      margin-bottom: 8px;
    }

    .card-header p {
      font-size: 0.95rem;
      color: #718096;
    }

    /* 참가자 ID */
    .id-section { margin-bottom: 28px; }
    .id-section label {
      display: block;
      font-size: 0.9rem;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: 8px;
    }
    .id-section input {
      width: 100%;
      padding: 11px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      color: #2d3748;
      outline: none;
      transition: border-color 0.2s;
    }
    .id-section input:focus { border-color: #667eea; }

    /* 구분선 */
    .divider {
      border: none;
      border-top: 1px solid #e2e8f0;
      margin: 28px 0;
    }

    /* 세그먼트 카드 */
    .segment-card {
      background: #f8fafc;
      border: 2px solid #e2e8f0;
      border-radius: 14px;
      padding: 24px 28px;
      margin-bottom: 20px;
      position: relative;
    }

    .segment-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .segment-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: #2d3748;
    }

    .segment-title .seg-index {
      display: inline-block;
      background: #667eea;
      color: #fff;
      font-size: 0.75rem;
      font-weight: 700;
      border-radius: 6px;
      padding: 2px 9px;
      margin-right: 8px;
    }

    .remove-btn {
      background: none;
      border: none;
      color: #a0aec0;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      line-height: 1;
      transition: background 0.15s, color 0.15s;
    }
    .remove-btn:hover { background: #fed7d7; color: #c53030; }

    /* 세그먼트 내 선택기 행 */
    .seg-selectors {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }

    .seg-group { flex: 1; }

    .seg-group-label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: #718096;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .seg-control {
      display: flex;
      border: 2px solid #e2e8f0;
      border-radius: 9px;
      overflow: hidden;
      background: #fff;
    }

    .seg-control input[type="radio"] { display: none; }

    .seg-control label {
      flex: 1;
      text-align: center;
      padding: 9px 4px;
      font-size: 0.88rem;
      font-weight: 500;
      color: #718096;
      cursor: pointer;
      border-right: 1px solid #e2e8f0;
      transition: background 0.12s, color 0.12s;
      user-select: none;
    }
    .seg-control label:last-of-type { border-right: none; }
    .seg-control input[type="radio"]:checked + label {
      background: #667eea;
      color: #fff;
      font-weight: 700;
    }

    /* 질문 블록 */
    .question-block { margin-bottom: 20px; }
    .question-block:last-of-type { margin-bottom: 0; }

    .question-label {
      font-size: 0.95rem;
      font-weight: 600;
      color: #2d3748;
      margin-bottom: 4px;
      line-height: 1.5;
    }

    .question-num {
      display: inline-block;
      background: #4a5568;
      color: #fff;
      font-size: 0.72rem;
      font-weight: 700;
      border-radius: 5px;
      padding: 1px 7px;
      margin-right: 7px;
      vertical-align: middle;
    }

    .likert {
      display: flex;
      gap: 6px;
      margin-top: 12px;
    }

    .likert-option { flex: 1; }
    .likert-option input[type="radio"] { display: none; }

    .likert-option label {
      cursor: pointer;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      padding: 10px 4px;
      border: 2px solid #e2e8f0;
      border-radius: 9px;
      background: #fff;
      transition: all 0.12s ease;
      user-select: none;
    }
    .likert-option label:hover { border-color: #a3bffa; background: #ebf4ff; }
    .likert-option input[type="radio"]:checked + label {
      border-color: #667eea;
      background: #667eea;
      color: #fff;
    }
    .likert-option input[type="radio"]:checked + label .score-num { color: #fff; }
    .likert-option input[type="radio"]:checked + label .score-text { color: rgba(255,255,255,0.85); }

    .score-num { font-size: 1.1rem; font-weight: 700; color: #4a5568; }
    .score-text { font-size: 0.6rem; font-weight: 500; color: #718096; text-align: center; line-height: 1.3; }

    /* 세그먼트 추가 버튼 */
    .add-segment-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 12px;
      margin-bottom: 28px;
      background: #fff;
      border: 2px dashed #c3d0e8;
      border-radius: 12px;
      color: #667eea;
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .add-segment-btn:hover { background: #ebf4ff; border-color: #667eea; }
    .add-segment-btn:disabled { color: #a0aec0; border-color: #e2e8f0; cursor: not-allowed; background: #fff; }

    /* 경고 배너 */
    .warn-banner {
      display: none;
      background: #fffbeb;
      border: 1px solid #f6e05e;
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 16px;
      font-size: 0.88rem;
      color: #744210;
    }
    .warn-actions { display: flex; gap: 10px; margin-top: 10px; }
    .warn-actions button {
      padding: 6px 16px;
      border-radius: 8px;
      border: none;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
    }
    .warn-confirm-btn { background: #667eea; color: #fff; }
    .warn-cancel-btn { background: #e2e8f0; color: #4a5568; }

    /* 제출 버튼 */
    .submit-btn {
      display: block;
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .submit-btn:hover { opacity: 0.92; }
    .submit-btn:active { transform: scale(0.99); }
    .submit-btn:disabled { background: #a0aec0; cursor: not-allowed; }

    .error-msg {
      display: none;
      text-align: center;
      color: #e53e3e;
      font-size: 0.9rem;
      margin-top: 12px;
    }

    /* 완료 메시지 */
    .success-msg {
      display: none;
      text-align: center;
      padding: 24px 0 8px;
    }
    .success-msg .icon { font-size: 3rem; margin-bottom: 12px; }
    .success-msg h2 { font-size: 1.3rem; color: #2d3748; margin-bottom: 8px; }
    .success-msg p { color: #718096; font-size: 0.95rem; }

    @media (max-width: 540px) {
      .card { padding: 28px 16px; }
      .segment-card { padding: 18px 16px; }
      .seg-selectors { flex-direction: column; gap: 14px; }
      .likert { gap: 4px; }
      .score-text { font-size: 0.55rem; }
    }
  </style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <h1>QoE 설문조사</h1>
    <p>각 항목에 대해 본인의 생각과 가장 가까운 점수를 선택해 주세요.</p>
  </div>

  <form id="surveyForm">
    <!-- 참가자 ID -->
    <div class="id-section">
      <label for="userId">참가자 ID</label>
      <input type="text" id="userId" placeholder="예: P001" autocomplete="off" />
    </div>

    <hr class="divider" />

    <!-- 세그먼트 목록 -->
    <div id="segmentList"></div>

    <!-- 세그먼트 추가 버튼 -->
    <button type="button" class="add-segment-btn" id="addSegmentBtn">
      + 세그먼트 추가
    </button>

    <!-- 경고 배너 -->
    <div class="warn-banner" id="warnBanner">
      ⚠️ 일부 문항에 응답하지 않은 세그먼트가 있습니다. 그래도 제출하시겠습니까?
      <div class="warn-actions">
        <button type="button" class="warn-confirm-btn" id="warnConfirm">그래도 제출</button>
        <button type="button" class="warn-cancel-btn" id="warnCancel">돌아가기</button>
      </div>
    </div>

    <button type="submit" class="submit-btn" id="submitBtn">제출하기</button>
    <div class="error-msg" id="errorMsg"></div>
  </form>

  <div class="success-msg" id="successMsg">
    <div class="icon">✅</div>
    <h2>설문이 완료되었습니다!</h2>
    <p>참여해 주셔서 감사합니다.</p>
  </div>
</div>

<script>
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxqrDu2Jmt7tOM9CCkb9AC6KOBkAjUtN9Ce3BR7r3BehyePwrQyfuGOjte5j132_D2xeA/exec";
  const MAX_SEGMENTS = 6;

  const QUESTIONS = [
    { key: "q1", text: "게임이 느리거나 부자연스럽게 느껴졌다" },
    { key: "q2", text: "상대가 나보다 유리한 환경이라고 느꼈다" },
    { key: "q3", text: "결과가 내 실력에 비해 잘 안 나온 것 같다고 느꼈다" },
    { key: "q4", text: "목표 달성에 본인이 충분히 기여했다고 느꼈다" },
  ];

  const LIKERT_LABELS = ["전혀<br>그렇지 않다", "그렇지<br>않다", "보통<br>이다", "그렇다", "매우<br>그렇다"];

  let segCounter = 0;
  const segmentList = document.getElementById("segmentList");
  const addSegmentBtn = document.getElementById("addSegmentBtn");
  const submitBtn = document.getElementById("submitBtn");
  const successMsg = document.getElementById("successMsg");
  const errorMsg = document.getElementById("errorMsg");
  const warnBanner = document.getElementById("warnBanner");

  function getSegmentCount() {
    return segmentList.querySelectorAll(".segment-card").length;
  }

  function updateAddBtn() {
    addSegmentBtn.disabled = getSegmentCount() >= MAX_SEGMENTS;
  }

  function updateSegmentHeaders() {
    const cards = segmentList.querySelectorAll(".segment-card");
    cards.forEach((card, i) => {
      card.querySelector(".seg-index").textContent = `세그먼트 ${i + 1}`;
      // 삭제 버튼: 1개 남으면 숨김
      const rmBtn = card.querySelector(".remove-btn");
      rmBtn.style.display = cards.length === 1 ? "none" : "inline-block";
    });
  }

  function addSegment(preset = {}) {
    if (getSegmentCount() >= MAX_SEGMENTS) return;
    const id = ++segCounter;

    const card = document.createElement("div");
    card.className = "segment-card";
    card.dataset.segId = id;

    card.innerHTML = `
      <div class="segment-card-header">
        <span class="segment-title"><span class="seg-index"></span></span>
        <button type="button" class="remove-btn" title="이 세그먼트 삭제">✕</button>
      </div>

      <div class="seg-selectors">
        <div class="seg-group">
          <span class="seg-group-label">시나리오</span>
          <div class="seg-control">
            ${[1,2,3].map(n => `
              <input type="radio" name="seg${id}_scenario" id="seg${id}_sc${n}" value="${n}" ${preset.scenario == n ? "checked" : ""} />
              <label for="seg${id}_sc${n}">${n}</label>
            `).join("")}
          </div>
        </div>
        <div class="seg-group">
          <span class="seg-group-label">단계</span>
          <div class="seg-control">
            <input type="radio" name="seg${id}_stage" id="seg${id}_before" value="적용 전" ${preset.stage === "적용 전" ? "checked" : ""} />
            <label for="seg${id}_before">적용 전</label>
            <input type="radio" name="seg${id}_stage" id="seg${id}_after" value="적용 후" ${preset.stage === "적용 후" ? "checked" : ""} />
            <label for="seg${id}_after">적용 후</label>
          </div>
        </div>
      </div>

      ${QUESTIONS.map((q, qi) => `
        <div class="question-block">
          <div class="question-label">
            <span class="question-num">Q${qi + 1}</span>${q.text}
          </div>
          <div class="likert">
            ${[1,2,3,4,5].map(v => `
              <div class="likert-option">
                <input type="radio" name="seg${id}_${q.key}" id="seg${id}_${q.key}_${v}" value="${v}" />
                <label for="seg${id}_${q.key}_${v}">
                  <span class="score-num">${v}</span>
                  <span class="score-text">${LIKERT_LABELS[v-1]}</span>
                </label>
              </div>
            `).join("")}
          </div>
        </div>
      `).join("")}
    `;

    card.querySelector(".remove-btn").addEventListener("click", () => {
      card.remove();
      updateSegmentHeaders();
      updateAddBtn();
    });

    segmentList.appendChild(card);
    updateSegmentHeaders();
    updateAddBtn();
  }

  addSegmentBtn.addEventListener("click", () => addSegment());

  // 초기 세그먼트 1개
  addSegment();

  // 미응답 경고 처리
  document.getElementById("warnConfirm").addEventListener("click", () => {
    warnBanner.style.display = "none";
    doSubmit(true);
  });
  document.getElementById("warnCancel").addEventListener("click", () => {
    warnBanner.style.display = "none";
  });

  document.getElementById("surveyForm").addEventListener("submit", (e) => {
    e.preventDefault();
    warnBanner.style.display = "none";
    hideError();

    const userId = document.getElementById("userId").value.trim();
    if (!userId) { showError("참가자 ID를 입력해 주세요."); return; }

    const cards = segmentList.querySelectorAll(".segment-card");
    let allValid = true;

    for (const card of cards) {
      const id = card.dataset.segId;
      const scenario = document.querySelector(`input[name="seg${id}_scenario"]:checked`);
      const stage    = document.querySelector(`input[name="seg${id}_stage"]:checked`);
      if (!scenario || !stage) {
        showError("모든 세그먼트에서 시나리오와 단계를 선택해 주세요.");
        card.scrollIntoView({ behavior: "smooth", block: "center" });
        return;
      }
    }

    // Q 미응답 체크
    let hasUnanswered = false;
    for (const card of cards) {
      const id = card.dataset.segId;
      for (const q of QUESTIONS) {
        if (!document.querySelector(`input[name="seg${id}_${q.key}"]:checked`)) {
          hasUnanswered = true;
          break;
        }
      }
      if (hasUnanswered) break;
    }

    if (hasUnanswered) {
      warnBanner.style.display = "block";
      return;
    }

    doSubmit(false);
  });

  async function doSubmit() {
    const userId = document.getElementById("userId").value.trim();
    const timestamp = new Date().toISOString();
    const cards = segmentList.querySelectorAll(".segment-card");

    const records = [];
    for (const card of cards) {
      const id = card.dataset.segId;
      const scenario = parseInt(document.querySelector(`input[name="seg${id}_scenario"]:checked`).value);
      const stage    = document.querySelector(`input[name="seg${id}_stage"]:checked`).value;
      const entry = { userId, scenario, stage, timestamp };
      for (const q of QUESTIONS) {
        const checked = document.querySelector(`input[name="seg${id}_${q.key}"]:checked`);
        entry[q.key] = checked ? parseInt(checked.value) : null;
      }
      records.push(entry);
    }

    submitBtn.disabled = true;
    submitBtn.textContent = "제출 중...";

    if (APPS_SCRIPT_URL === "YOUR_APPS_SCRIPT_URL_HERE") {
      saveLocally(records);
      showSuccess();
      return;
    }

    try {
      await fetch(APPS_SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ records }),
      });
      saveLocally(records);
      showSuccess();
    } catch (err) {
      submitBtn.disabled = false;
      submitBtn.textContent = "제출하기";
      showError("제출 중 오류가 발생했습니다. 다시 시도해 주세요.");
    }
  }

  function saveLocally(records) {
    const key = "qoe_responses";
    const existing = JSON.parse(localStorage.getItem(key) || "[]");
    existing.push(...records);
    localStorage.setItem(key, JSON.stringify(existing));
  }

  function showSuccess() {
    document.getElementById("surveyForm").style.display = "none";
    successMsg.style.display = "block";
  }

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.style.display = "block";
  }

  function hideError() {
    errorMsg.style.display = "none";
  }
</script>
</body>
</html>
